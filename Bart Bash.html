<!DOCTYPE html>
<html lang="en">
	<head>
		<base href="https://cdn.jsdelivr.net/gh/67-Factory/web-ports@main/stupidbartbash/">
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>bartbash</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
	width: 100%;
	height: 100%;
}

body {
	color: white;
	background-image: url('load.png');
	background-color: #111; 
	background-size: contain;
	background-position: center center;
	background-repeat: no-repeat;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status {
	position: absolute;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	visibility: hidden;
	
}

#status-splash {

	position: absolute;
	top: 1%;
	left: 50%;
	transform: translate(-50%, -50%);
	max-width: 80vw;
	max-height: 40vh;
}

#status-progress {
	display: none;
	position: absolute;
	left: 50%;
	bottom: 38.0%;
	transform: translateX(-50%);

	width: 79.3vw;
	height: 35.5px;

	-webkit-appearance: none;
	appearance: none;
	border: 1px solid white; 
	background-color: transparent; 
	overflow: hidden; 
}



#status-notice {
	display: none;
	background-color: rgba(91, 57, 67, 0.9); 
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 1rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	position: absolute;
	left: 0;
	right: 0;
	top: 50%;
	transform: translateY(-50%);
	z-index: 1;
}


#status-splash.show-image--false { display: none; }
#status-splash.use-filter--false { image-rendering: pixelated; }
		</style>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
<script>
async function fetchAndMergeFile(baseUrl, filename, parts) {
  const chunks = [];
  
  for (let i = 1; i <= parts; i++) {
    const response = await fetch(`${baseUrl}${filename}.part${i}`);
    if (!response.ok) throw new Error(`Failed to fetch ${filename}.part${i}`);
    const arrayBuffer = await response.arrayBuffer();
    chunks.push(arrayBuffer);
  }
  
  const totalLength = chunks.reduce((sum, chunk) => sum + chunk.byteLength, 0);
  const merged = new Uint8Array(totalLength);
  let offset = 0;
  
  for (const chunk of chunks) {
    merged.set(new Uint8Array(chunk), offset);
    offset += chunk.byteLength;
  }
  
  return merged.buffer;
}

async function initializeGame() {
  const baseUrl = 'https://cdn.jsdelivr.net/gh/67-Factory/web-ports@main/stupidbartbash/';
  
  console.log('loading them files');
  const [wasmData, pckData] = await Promise.all([
    fetchAndMergeFile(baseUrl, 'index.wasm', 3),
    fetchAndMergeFile(baseUrl, 'index.pck', 6)
  ]);
  
  console.log('merged FINALLY');

  const originalFetch = window.fetch;
  window.fetch = function(url, options) {
    if (url.includes('index.wasm')) {
      return Promise.resolve(new Response(wasmData, {
        status: 200,
        headers: { 'Content-Type': 'application/wasm' }
      }));
    }
    if (url.includes('index.pck')) {
      return Promise.resolve(new Response(pckData, {
        status: 200,
        headers: { 'Content-Type': 'application/octet-stream' }
      }));
    }
    return originalFetch(url, options);
  };
  
  console.log('starting engine');
  startGodotEngine();
}

function startGodotEngine() {
  const GODOT_CONFIG = {
    "args":[],
    "canvasResizePolicy":2,
    "ensureCrossOriginIsolationHeaders":true,
    "executable":"index",
    "experimentalVK":false,
    "fileSizes":{"index.pck":81342576,"index.wasm":43699192},
    "focusCanvas":true,
    "gdextensionLibs":[]
  };
  const GODOT_THREADS_ENABLED = false;
  const engine = new Engine(GODOT_CONFIG);

  (function () {
    const statusOverlay = document.getElementById('status');
    const statusProgress = document.getElementById('status-progress');
    const statusNotice = document.getElementById('status-notice');

    let initializing = true;
    let statusMode = '';

    function setStatusMode(mode) {
      if (statusMode === mode || !initializing) {
        return;
      }
      if (mode === 'hidden') {
        statusOverlay.remove();
        initializing = false;
        return;
      }
      statusOverlay.style.visibility = 'visible';
      statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
      statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
      statusMode = mode;
    }

    function setStatusNotice(text) {
      while (statusNotice.lastChild) {
        statusNotice.removeChild(statusNotice.lastChild);
      }
      const lines = text.split('\n');
      lines.forEach((line) => {
        statusNotice.appendChild(document.createTextNode(line));
        statusNotice.appendChild(document.createElement('br'));
      });
    }

    function displayFailureNotice(err) {
      console.error(err);
      if (err instanceof Error) {
        setStatusNotice(err.message);
      } else if (typeof err === 'string') {
        setStatusNotice(err);
      } else {
        setStatusNotice('An unknown error occurred.');
      }
      setStatusMode('notice');
      initializing = false;
    }

    const missing = Engine.getMissingFeatures({
      threads: GODOT_THREADS_ENABLED,
    });

    if (missing.length !== 0) {
      const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
      displayFailureNotice(missingMsg + missing.join('\n'));
    } else {
      setStatusMode('progress');
      engine.startGame({
        'onProgress': function (current, total) {
          if (current > 0 && total > 0) {
            statusProgress.value = current;
            statusProgress.max = total;
          } else {
            statusProgress.removeAttribute('value');
            statusProgress.removeAttribute('max');
          }
        },
      }).then(() => {
        setStatusMode('hidden');
      }, displayFailureNotice);
    }
  }());
}

initializeGame().catch(err => {
  console.error('Failed to initialize game:', err);
  document.getElementById('status-notice').textContent = 'Failed to load game files: ' + err.message;
  document.getElementById('status-notice').style.display = 'block';
});
</script>
	</body>
</html>
